<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevArchAI – Risk Analysis</title>

  <!-- Cytoscape for Dependency Graph -->
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    h1 {
      margin-bottom: 6px;
    }

    h2 {
      margin-top: 28px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 16px;
    }

    .card {
      background: #f9f9f9;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 6px;
      border-left: 6px solid #ccc;
    }

    .high { border-left-color: #d9534f; }
    .medium { border-left-color: #f0ad4e; }
    .low { border-left-color: #5cb85c; }

    .reason {
      margin-top: 8px;
      font-style: italic;
    }

    #dependency-graph {
      width: 100%;
      height: 420px;
      border: 1px solid #ccc;
      margin-top: 12px;
      border-radius: 6px;
    }

    footer {
      margin-top: 28px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }
  </style>
</head>

<body>

  <h1>DevArchAI – Architectural Risk Analysis</h1>
  <div class="subtitle">
    Risk levels and confidence scores generated by the trained DevArchAI machine learning model.
  </div>

  <!-- ===============================
       ML RISK ANALYSIS SECTION
       =============================== -->

  <div id="risk-container"></div>

  <!-- ===============================
       DEPENDENCY GRAPH SECTION
       =============================== -->

  <h2>Service Dependency Graph</h2>
  <div id="dependency-graph"></div>

  <footer>
    ML-Driven • Dependency-Aware • Explainable
  </footer>

  <!-- ===============================
       SCRIPT
       =============================== -->

  <script>
    const data = __DEVARCHAI_DATA__;

    /* --------------------------------
       Render ML Risk Cards
    --------------------------------- */

    const container = document.getElementById('risk-container');

    data.risk_analysis.forEach(item => {
      const level = item.predicted_risk_level;
      const label = level === 2 ? 'HIGH' : level === 1 ? 'MEDIUM' : 'LOW';
      const cls = level === 2 ? 'high' : level === 1 ? 'medium' : 'low';
      const confidence = Math.round(item.risk_confidence * 100);

      const card = document.createElement('div');
      card.className = `card ${cls}`;

      card.innerHTML = `
        <h3>${item.service}</h3>
        <p><b>Risk Level:</b> ${label}</p>
        <p><b>Model Confidence:</b> ${confidence}%</p>
        <p class="reason">${item.reason}</p>
      `;

      container.appendChild(card);
    });

    /* --------------------------------
       Render Dependency Graph
    --------------------------------- */

    if (data.dependency_graph) {

      const elements = [];

      // Nodes
      data.dependency_graph.nodes.forEach(service => {
        elements.push({
          data: {
            id: service,
            label: service
          }
        });
      });

      // Edges
      data.dependency_graph.edges.forEach(edge => {
        elements.push({
          data: {
            source: edge.from_service,
            target: edge.to_service
          }
        });
      });

      cytoscape({
        container: document.getElementById('dependency-graph'),
        elements: elements,
        style: [
          {
            selector: 'node',
            style: {
              'label': 'data(label)',
              'background-color': '#007acc',
              'color': '#ffffff',
              'text-valign': 'center',
              'text-halign': 'center',
              'font-size': '10px',
              'padding': '8px',
              'width': 'label'
            }
          },
          {
            selector: 'edge',
            style: {
              'width': 2,
              'line-color': '#999',
              'target-arrow-color': '#999',
              'target-arrow-shape': 'triangle',
              'curve-style': 'bezier'
            }
          }
        ],
        layout: {
          name: 'breadthfirst',
          directed: true,
          padding: 10
        }
      });
    }
  </script>

</body>
</html>
